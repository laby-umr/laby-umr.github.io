# 推送到 main/master 时：构建镜像 → 推送到 GHCR → SSH 到服务器拉取并启动
name: Deploy to Server (GHCR)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# 需要 packages:write 才能推送到 GHCR
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  SERVER_HOST: "120.48.86.168"
  DEPLOY_PATH: "/opt/laby-blog"

jobs:
  build-and-push:
    name: 构建并推送到 GHCR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build-and-push
    # 若你不想让 GitHub 连服务器（22 端口），在仓库 Variables 里添加 ENABLE_SSH_DEPLOY=false 可跳过此 job
    if: ${{ vars.ENABLE_SSH_DEPLOY != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: 生成 docker-compose 配置
        run: |
          sed "s|IMAGE_PLACEHOLDER|${{ env.REGISTRY }}/${{ github.repository }}:latest|g" docker-compose.prod.yml > docker-compose.deploy.yml

      - name: 上传 docker-compose 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.deploy.yml"
          target: ${{ env.DEPLOY_PATH }}

      - name: 在服务器上拉取并启动
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # 避免拉取镜像慢导致超时（例如大层下载、国内网络慢）
          command_timeout: 60m
          timeout: 60m
          script: |
            cd ${{ env.DEPLOY_PATH }}
            mv docker-compose.deploy.yml docker-compose.yml
            # 减少输出，避免 log 过长；拉取慢时给足时间
            docker compose pull --quiet
            docker compose up -d --remove-orphans
