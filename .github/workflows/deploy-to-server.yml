# 推送到 main/master 时：构建静态文件 → SCP 传到服务器 → 重启 nginx 容器
name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  SERVER_HOST: "120.48.86.168"
  DEPLOY_PATH: "/opt/laby-blog"

jobs:
  build-and-deploy:
    name: 构建并部署到服务器
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SSH_DEPLOY != 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建静态站点
        env:
          DOCUSAURUS_IGNORE_SSG_WARNINGS: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build

      - name: 打包构建产物
        run: tar -czf build.tar.gz -C build .

      - name: 上传构建产物和配置到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "build.tar.gz,nginx.conf,docker-compose.prod.yml"
          target: ${{ env.DEPLOY_PATH }}

      - name: 在服务器上部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # 解压构建产物到 html 目录
            mkdir -p html
            tar -xzf build.tar.gz -C html
            rm -f build.tar.gz

            # 使用生产 compose 配置
            cp -f docker-compose.prod.yml docker-compose.yml

            # 启动/重启 nginx 容器
            docker compose up -d --remove-orphans --force-recreate

            echo "部署完成！"
            docker compose ps
