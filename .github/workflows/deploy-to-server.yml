# 推送到 main/master 时：构建镜像 → 推送到 GHCR → SSH 到 120.48.86.168 拉取并启动
name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_HOST: "120.48.86.168"
  # 服务器上的部署目录，需事先创建（如 mkdir -p /opt/laby-blog）
  DEPLOY_PATH: "/opt/laby-blog"

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 部署到 120.48.86.168
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: 生成 docker-compose 配置
        run: |
          sed "s|IMAGE_PLACEHOLDER|${{ env.REGISTRY }}/${{ github.repository }}:latest|g" docker-compose.prod.yml > docker-compose.deploy.yml

      - name: 上传 docker-compose 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.deploy.yml"
          target: ${{ env.DEPLOY_PATH }}

      - name: 在服务器上拉取镜像并启动
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ${{ env.DEPLOY_PATH }}
            mv docker-compose.deploy.yml docker-compose.yml
            docker compose pull
            docker compose up -d
