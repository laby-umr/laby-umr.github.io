<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DEV-SLAYER | LIU JIAXING</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .japanese-pattern {
            background-color: #fefcf4;
            background-image: 
                linear-gradient(45deg, #383833 25%, transparent 25%, transparent 75%, #383833 75%, #383833), 
                linear-gradient(45deg, #383833 25%, transparent 25%, transparent 75%, #383833 75%, #383833);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            opacity: 0.03;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* Screen Shake */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-4px, 4px) rotate(-1.5deg); }
            50% { transform: translate(4px, -4px) rotate(1.5deg); }
            75% { transform: translate(-4px, -4px) rotate(-1.5deg); }
        }
        .shake-active {
            animation: shake 0.1s cubic-bezier(.36,.07,.19,.97) both;
        }
        /* Slash Effect */
        .slash-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 40;
        }
        .slash {
            position: absolute;
            background: white;
            height: 4px;
            width: 150%;
            transform-origin: center;
            opacity: 0;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        @keyframes slash-anim {
            0% { transform: scaleX(0) rotate(var(--angle)) translateY(var(--offset)); opacity: 1; }
            50% { transform: scaleX(1) rotate(var(--angle)) translateY(var(--offset)); opacity: 1; }
            100% { transform: scaleX(1) rotate(var(--angle)) translateY(var(--offset)); opacity: 0; }
        }
        .slash-trigger {
            animation: slash-anim 0.2s ease-out forwards;
        }
        /* Anime Flame */
        .flame-container {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100px;
            width: 60px;
            filter: blur(2px);
        }
        .flame {
            position: absolute;
            bottom: 0;
            width: 30px;
            height: 30px;
            background: linear-gradient(to top, #314ff4, #7387ff, transparent);
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite alternate;
        }
        @keyframes flicker {
            0% { transform: scale(1, 1) translateY(0); opacity: 0.8; }
            100% { transform: scale(1.2, 1.8) translateY(-10px); opacity: 1; }
        }
        .flame-outer {
            width: 45px;
            height: 60px;
            background: linear-gradient(to top, #c60159, transparent);
            animation: flicker 0.15s infinite alternate-reverse;
            opacity: 0.6;
        }
        /* Manga Explosion Callout */
        .explosion-bubble {
            position: relative;
            background: #fae500;
            clip-path: polygon(50% 0%, 61% 10%, 80% 0%, 75% 25%, 100% 20%, 85% 45%, 100% 70%, 75% 75%, 80% 100%, 55% 85%, 45% 100%, 30% 80%, 0% 100%, 15% 70%, 0% 50%, 20% 40%, 0% 10%, 35% 25%);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #383833;
        }
        .explosion-orange {
            position: absolute;
            inset: 6px;
            background: #ff8c00;
            clip-path: polygon(50% 0%, 61% 10%, 80% 0%, 75% 25%, 100% 20%, 85% 45%, 100% 70%, 75% 75%, 80% 100%, 55% 85%, 45% 100%, 30% 80%, 0% 100%, 15% 70%, 0% 50%, 20% 40%, 0% 10%, 35% 25%);
            z-index: -1;
        }
        @keyframes combo-heavy-hit {
            0% { transform: scale(1) rotate(0deg); }
            20% { transform: scale(1.3) rotate(-5deg); }
            40% { transform: scale(0.95) rotate(5deg); }
            60% { transform: scale(1.1) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .combo-hit-anim {
            animation: combo-heavy-hit 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        /* Frenzy Button */
        @keyframes frenzy-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .frenzy-active {
            animation: frenzy-shake 0.15s infinite;
            box-shadow: 0 0 20px #c60159, 10px 10px 0px 0px rgba(0,0,0,1) !important;
        }
        /* Shatter Transition */
        .shatter-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #383833;
            display: none;
        }
        @keyframes shatter-out {
            0% { transform: scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1.5); opacity: 0; filter: blur(20px); }
        }
        .shattering {
            animation: shatter-out 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#314ff4",
                      "on-surface": "#383833",
                      "secondary": "#6f6600",
                      "secondary-container": "#fae500",
                      "tertiary": "#c60159",
                      "tertiary-container": "#ff8fa9",
                      "surface": "#fefcf4",
                      "background": "#fefcf4",
                      "outline": "#81817a",
                      "surface-container-highest": "#e9e9de"
              },
              "borderRadius": {
                      "DEFAULT": "0.5rem"
              },
              "fontFamily": {
                      "headline": ["Space Grotesk"],
                      "body": ["Plus Jakarta Sans"]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary selection:text-on-secondary-container overflow-hidden transition-all duration-300" id="main-body">
<!-- Visual FX Layer -->
<div class="slash-container" id="slash-layer"></div>
<!-- Background Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 japanese-pattern"></div>
<div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface/90 to-primary/10"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6 md:p-12" id="canvas">
<!-- Top Header Status -->
<div class="absolute top-12 left-1/2 -translate-x-1/2 flex items-center space-x-6">
<div class="flex flex-col items-end">
<span class="font-headline font-black text-xs tracking-[0.3em] text-outline uppercase">System Status</span>
<span class="font-headline font-bold text-lg text-primary transition-all duration-300" id="status-text">INITIALIZING...</span>
</div>
<div class="h-12 w-[3px] bg-on-surface"></div>
<div class="flex flex-col items-start">
<span class="font-headline font-black text-xs tracking-[0.3em] text-outline uppercase">User Level</span>
<span class="font-headline font-bold text-lg text-secondary">HASHIRA_DEV_L7</span>
</div>
</div>
<!-- Centerpiece Section -->
<div class="w-full max-w-4xl flex flex-col items-center space-y-12">
<!-- Branding -->
<div class="text-center space-y-2">
<h1 class="font-headline text-6xl md:text-8xl font-black italic tracking-tighter text-on-surface">
                    LIU <span class="text-primary">JIAXING</span>
</h1>
<p class="font-headline text-xl md:text-2xl font-bold tracking-widest text-secondary flex items-center justify-center gap-4">
<span class="w-8 h-[2px] bg-secondary"></span>
                    THE CODE SLAYER
                    <span class="w-8 h-[2px] bg-secondary"></span>
</p>
</div>
<!-- Total Concentration Progress Bar -->
<div class="w-full space-y-8">
<div class="flex justify-between items-end px-2">
<div class="flex flex-col">
<span class="font-headline font-black text-2xl italic text-on-surface">TOTAL CONCENTRATION</span>
<span class="font-body font-bold text-xs tracking-tighter text-outline" id="technique-label">BREATHING TECHNIQUE: STANDBY</span>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-black text-5xl text-primary" id="progress-percent">0%</span>
</div>
</div>
<div class="relative h-24 w-full bg-surface-container-highest border-4 border-on-surface shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] overflow-visible">
<div class="absolute inset-y-0 left-0 w-0 bg-primary border-r-4 border-on-surface flex items-center justify-end px-4 overflow-visible transition-all duration-200" id="progress-bar">
<div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary-container via-primary to-transparent"></div>
<!-- Anime Flame Tip -->
<div class="flame-container hidden" id="flame-tip">
<div class="flame flame-outer"></div>
<div class="flame"></div>
</div>
<div class="flex space-x-2 animate-pulse-slow">
<div class="w-1 h-12 bg-white/40 skew-x-[25deg]"></div>
<div class="w-2 h-12 bg-white/20 skew-x-[25deg]"></div>
<div class="w-1 h-12 bg-white/60 skew-x-[25deg]"></div>
</div>
</div>
</div>
</div>
<!-- DYNAMIC COMBO COUNTER UI -->
<div class="flex items-center justify-center gap-12 scale-0 opacity-0 transition-all duration-300 pointer-events-none" id="combo-container">
<span class="font-headline font-black text-8xl italic text-secondary-container drop-shadow-[6px_6px_0px_#383833] tracking-tighter">COMBO</span>
<div class="explosion-bubble shadow-[10px_10px_0px_0px_#383833] border-4">
<div class="explosion-orange"></div>
<div class="flex flex-col items-center relative z-10">
<span class="font-headline font-black text-6xl italic text-on-surface drop-shadow-[0_2px_0px_white]" id="combo-count">0</span>
</div>
</div>
</div>
<!-- CTA Section -->
<div class="flex flex-col items-center space-y-6">
<button class="relative px-16 py-8 bg-secondary-container text-on-surface font-headline font-black text-4xl italic tracking-tighter border-4 border-on-surface shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] hover:scale-105 active:scale-95 active:shadow-none transition-all duration-75 cursor-pointer disabled:opacity-50" id="mash-button">
<span class="relative z-10 flex items-center gap-4" id="btn-label">
                        INITIALIZING...
                    </span>
<div class="absolute top-0 left-0 w-full h-1/2 bg-white/20 pointer-events-none"></div>
<div class="absolute -top-6 -right-6 bg-tertiary text-white text-xs px-2 py-1 rotate-12 font-black border-2 border-on-surface hidden frenzy-cue">CLICK ME!</div>
<div class="absolute -bottom-6 -left-6 bg-primary text-white text-xs px-2 py-1 -rotate-12 font-black border-2 border-on-surface hidden frenzy-cue">MASH!</div>
</button>
<p class="font-body font-medium text-outline text-sm tracking-widest uppercase" id="instruction-text">
                    Waiting for system sync...
                </p>
</div>
</div>
<!-- Footer Info -->
<div class="absolute bottom-12 w-full max-w-7xl px-12 flex flex-col md:flex-row justify-between items-center text-on-surface font-headline font-bold text-xs tracking-widest uppercase opacity-60">
<div class="flex items-center gap-4 mb-4 md:mb-0">
<span>VER: 2024.NICHO_DEV</span>
<span class="h-4 w-[1px] bg-outline"></span>
<span>ENC: NEOTOKYO_CEL</span>
</div>
<div class="flex items-center gap-8">
<a class="hover:text-primary transition-colors" href="#">Github</a>
<a class="hover:text-primary transition-colors" href="#">LinkedIn</a>
<a class="hover:text-primary transition-colors" href="#">Archives</a>
</div>
</div>
</main>
<div class="shatter-overlay" id="shatter-fx"></div>
<script>
        const mashBtn = document.getElementById('mash-button');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const statusText = document.getElementById('status-text');
        const techniqueLabel = document.getElementById('technique-label');
        const instructionText = document.getElementById('instruction-text');
        const btnLabel = document.getElementById('btn-label');
        const flameTip = document.getElementById('flame-tip');
        const canvas = document.getElementById('canvas');
        const comboContainer = document.getElementById('combo-container');
        const comboCountEl = document.getElementById('combo-count');
        const slashLayer = document.getElementById('slash-layer');
        const shatterFx = document.getElementById('shatter-fx');
        const frenzyCues = document.querySelectorAll('.frenzy-cue');

        let currentProgress = 0;
        let combo = 0;
        let isFrenzyMode = false;
        let autoLoading = true;

        // Phase 1: Rapid Auto-Load to 97%
        const autoLoadInterval = setInterval(() => {
            if (autoLoading) {
                currentProgress += (Math.random() * 2) + 0.5;
                if (currentProgress >= 97) {
                    currentProgress = 97;
                    autoLoading = false;
                    clearInterval(autoLoadInterval);
                    activateFrenzyMode();
                }
                updateProgressUI();
            }
        }, 30);

        function updateProgressUI() {
            progressBar.style.width = `${currentProgress}%`;
            progressPercent.innerText = `${Math.floor(currentProgress)}%`;
            
            if (currentProgress >= 97) {
                flameTip.classList.remove('hidden');
            }
        }

        function activateFrenzyMode() {
            isFrenzyMode = true;
            statusText.innerText = 'CRITICAL LIMIT REACHED';
            statusText.classList.replace('text-primary', 'text-tertiary');
            techniqueLabel.innerText = 'BREATHING TECHNIQUE: NINTH FORM - BURST';
            instructionText.innerHTML = 'MASH <span class="px-2 py-1 bg-on-surface text-surface rounded font-bold mx-1">SPACE</span> OR <span class="font-black italic text-tertiary">CLICK</span> TO BREAK THROUGH!';
            btnLabel.innerHTML = 'BURST REALM <span class="material-symbols-outlined text-4xl animate-pulse">bolt</span>';
            
            mashBtn.classList.add('frenzy-active');
            mashBtn.classList.replace('bg-secondary-container', 'bg-tertiary-container');
            frenzyCues.forEach(cue => cue.classList.remove('hidden'));
            
            comboContainer.classList.remove('scale-0', 'opacity-0');
        }

        function triggerSlash() {
            for(let i=0; i<3; i++) {
                const slash = document.createElement('div');
                slash.className = 'slash slash-trigger';
                const angle = (Math.random() * 360);
                const offset = (Math.random() - 0.5) * 500;
                slash.style.setProperty('--angle', `${angle}deg`);
                slash.style.setProperty('--offset', `${offset}px`);
                slash.style.top = `${window.innerHeight / 2}px`;
                slash.style.left = `-25%`;
                slashLayer.appendChild(slash);
                setTimeout(() => slash.remove(), 250);
            }
        }

        function handleInput() {
            if (!isFrenzyMode) return;

            // Shake canvas
            canvas.classList.remove('shake-active');
            void canvas.offsetWidth;
            canvas.classList.add('shake-active');

            // Progress logic (1% per hit)
            if (currentProgress < 100) {
                currentProgress += 1;
                if (currentProgress > 100) currentProgress = 100;
                updateProgressUI();
            }

            // Combo logic
            combo++;
            comboCountEl.innerText = combo;
            
            // Trigger heavy hit animation on combo container
            comboContainer.classList.remove('combo-hit-anim');
            void comboContainer.offsetWidth; // Trigger reflow
            comboContainer.classList.add('combo-hit-anim');
            
            triggerSlash();

            if (currentProgress >= 100) {
                shatterTransition();
            }
        }

        function shatterTransition() {
            isFrenzyMode = false;
            shatterFx.style.display = 'block';
            shatterFx.classList.add('shattering');
            mashBtn.disabled = true;
            
            setTimeout(() => {
                document.getElementById('main-body').style.backgroundColor = '#000';
                document.getElementById('main-body').innerHTML = `
                    <div class="h-screen w-screen flex flex-col items-center justify-center font-headline font-black text-white italic p-12 text-center">
                        <div class="text-8xl mb-8 animate-bounce">READY</div>
                        <div class="text-2xl tracking-[1em] opacity-50">REALM UNSHEATHED</div>
                    </div>
                `;
            }, 800);
        }

        mashBtn.addEventListener('click', (e) => {
            handleInput();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                handleInput();
                // Button visual feedback
                mashBtn.style.transform = 'scale(0.9) skewX(-2deg)';
                setTimeout(() => mashBtn.style.transform = '', 50);
            }
        });
    </script>
</body></html>
